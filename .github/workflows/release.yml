name: Release

on:
  push:
    tags:
      - 'v*'
  workflow_dispatch:

permissions:
  contents: write
  packages: write

jobs:
  release:
    name: Build & Release
    runs-on: ubuntu-latest
    steps:
      - name: Check out code
        uses: actions/checkout@v4

      - name: Set up Go
        uses: actions/setup-go@v5
        with:
          go-version: '1.23'
          check-latest: true

      - name: Install dependencies
        run: go mod download

      - name: Extract version from tag
        id: version
        run: echo "version=${GITHUB_REF_NAME#v}" >> $GITHUB_OUTPUT

      - name: Build for all platforms
        run: |
          VERSION=${{ steps.version.outputs.version }}
          mkdir -p release

          # macOS amd64
          GOOS=darwin GOARCH=amd64 go build \
            -o release/db_mcp_server-darwin-amd64 \
            -ldflags="-s -w -X main.version=$VERSION" \
            ./cmd/server

          # macOS arm64
          GOOS=darwin GOARCH=arm64 go build \
            -o release/db_mcp_server-darwin-arm64 \
            -ldflags="-s -w -X main.version=$VERSION" \
            ./cmd/server

          # Linux amd64
          GOOS=linux GOARCH=amd64 go build \
            -o release/db_mcp_server-linux-amd64 \
            -ldflags="-s -w -X main.version=$VERSION" \
            ./cmd/server

          # Linux arm64
          GOOS=linux GOARCH=arm64 go build \
            -o release/db_mcp_server-linux-arm64 \
            -ldflags="-s -w -X main.version=$VERSION" \
            ./cmd/server

          # Windows amd64
          GOOS=windows GOARCH=amd64 go build \
            -o release/db_mcp_server-windows-amd64.exe \
            -ldflags="-s -w -X main.version=$VERSION" \
            ./cmd/server

      - name: Log in to GitHub Container Registry
        uses: docker/login-action@v4
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Build and push Docker image
        run: |
          VERSION=${{ steps.version.outputs.version }}
          IMAGE=ghcr.io/${{ github.repository_owner }}/db-mcp-server
          docker build -t $IMAGE:$VERSION -t $IMAGE:latest .
          docker push $IMAGE:$VERSION
          docker push $IMAGE:latest

      - name: Create Release
        uses: softprops/action-gh-release@v2
        with:
          tag_name: ${{ github.ref_name }}
          name: Release ${{ github.ref_name }}
          draft: false
          prerelease: false
          generate_release_notes: true
          files: |
            release/db_mcp_server-darwin-amd64
            release/db_mcp_server-darwin-arm64
            release/db_mcp_server-linux-amd64
            release/db_mcp_server-linux-arm64
            release/db_mcp_server-windows-amd64.exe
          fail_on_unmatched_files: true
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
